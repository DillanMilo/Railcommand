<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — RailCommand</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F172A;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 420px;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      opacity: 0.8;
    }
    .brand {
      color: #F97316;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #94A3B8;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-block;
      background: #F97316;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .retry-btn:hover {
      background: #EA580C;
    }
    .retry-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F6F0;&#xFE0F;</div>
    <div class="brand">RailCommand</div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <button class="retry-btn" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
